<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin Control Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="admin-main-container">
    <h1 class="main-title">MASTER ADMIN CONTROL PANEL</h1>

    <!-- =======================================================
         সেকশন ১: সিস্টেম কনফিগারেশন (SYSTEM CONFIGURATION)
         ======================================================= -->
    <div class="partition-card">
        <div class="partition-header">⚙️ সেকশন ১: সিস্টেম কনফিগারেশন</div>
        <div class="form-group">
            <label>Game Calculation Mode (গেম মোড)</label>
            <select id="calcMode">
                <option value="auto">Automatic (Low Investment Wins)</option>
                <option value="manual">Manual Control</option>
            </select>
        </div>
        <div class="form-group">
            <label>Daily Max Withdraw Limit (সর্বোচ্চ উইথড্র লিমিট)</label>
            <input type="number" id="maxWithdrawLimit" value="1000" placeholder="টাকার পরিমাণ লিখুন">
        </div>
        
        <div class="action-area">
            <label class="checkbox-container">
                <input type="checkbox" id="check_sec1"> আমি এই গ্লোবাল সেটিংস আপডেট করতে চাই
            </label>
            <button type="button" class="btn btn-blue" id="btn_sec1" onclick="updateSystemSettings()" disabled>UPDATE SETTINGS</button>
        </div>
    </div>

    <!-- =======================================================
         সেকশন ২: ডাইনামিক বাজি ও রেগুলার টাইম শিডিউল (BAZI ROUTINE)
         ======================================================= -->
    <div class="partition-card">
        <div class="partition-header">📅 সেকশন ২: বাজি ও রেগুলার টাইম শিডিউল</div>
        <div class="form-group">
            <label>সিলেক্ট ডেট (তারিখ)</label>
            <input type="date" id="baziDate">
        </div>
        <div class="form-group">
            <label>বাজির নাম (যেমন: Bazi 1, Bazi 2)</label>
            <input type="text" id="baziName" placeholder="উদা: Bazi 1">
        </div>
        <div class="form-group">
            <label>ফিক্সড লক টাইম (সময়)</label>
            <input type="time" id="baziTime">
        </div>
        
        <div class="action-area">
            <label class="checkbox-container">
                <input type="checkbox" id="check_sec2"> প্রতিদিন এই টাইমে বাjiটি অটো-রিপিট করতে চাই
            </label>
            <button type="button" class="btn btn-green" id="btn_sec2" onclick="saveBaziRoutine()" disabled>ADD TO MASTER ROUTINE</button>
        </div>
    </div>

    <!-- =======================================================
         সেকশন ৩: লাইভ বাজি ও রেজাল্ট কন্ট্রোল (LIVE BAZI & RESULT)
         ======================================================= -->
    <div class="partition-card">
        <div class="partition-header">🏆 সেকশন ৩: লাইভ বাজি ও রেজাল্ট ঘোষণা</div>
        <div class="live-status-table">
            <!-- এখানে ফায়ারবেস থেকে লাইভ বাজি রুল লোড হবে -->
            <p>লাইভ ডাটা লোড হচ্ছে...</p>
        </div>
        <div class="form-group">
            <label>ম্যানুয়াল রেজাল্ট ইনপুট বক্স (Single / Patti)</label>
            <input type="text" id="winResult" placeholder="উদা: 5 / 123">
        </div>
        
        <div class="action-area">
            <label class="checkbox-container">
                <input type="checkbox" id="check_sec3"> আমি নিশ্চিত হয়ে এই রেজাল্ট ঘোষণা করছি
            </label>
            <button type="button" class="btn btn-purple" id="btn_sec3" onclick="publishBaziResult()" disabled>PUBLISH RESULT</button>
        </div>
    </div>

    <!-- =======================================================
         সেকশন ৪: প্লেয়ার উইনিং ও উইড্রো রিকোয়েস্ট (WITHDRAWAL & OTP MANAGER)
         ======================================================= -->
    <div class="partition-card">
        <div class="partition-header">💰 সেকশন ৪: প্লেয়ার উইনিং ও উইড্রো এপ্রুভাল (OTP)</div>
        <div class="withdraw-request-list">
            <!-- প্লেয়ার উইড্রো রিকোয়েস্ট দিলে এখানে শো করবে -->
            <p>কোনো পেন্ডিং উইড্রো রিকোয়েস্ট নেই।</p>
        </div>
        <div class="form-group">
            <label>এডমিন ওটিপি কোড জেনারেট (OTP)</label>
            <input type="text" id="generatedOTP" readonly placeholder="কোড এখানে তৈরি হবে">
            <button type="button" class="btn btn-small" onclick="generateSecureOTP()">জেনারেল OTP</button>
        </div>
        
        <div class="action-area">
            <label class="checkbox-container">
                <input type="checkbox" id="check_sec4"> ওটিপি ভেরিফাই করে উইড্রো সফল করতে চাই
            </label>
            <button type="button" class="btn btn-orange" id="btn_sec4" onclick="approveWithdrawal()" disabled>APPROVE WITHDRAWAL</button>
        </div>
    </div>

    <!-- =======================================================
         সেকশন ৫: প্লেয়ার পয়েন্ট ডেবিট/ক্রেডিট ও অ্যাকাউন্ট ম্যানেজমেন্ট
         ======================================================= -->
    <div class="partition-card">
        <div class="partition-header">👤 সেকশন ৫: প্লেয়ার ভেরিফিকেশন ও পয়েন্ট ডেবিট/ক্রেডিট</div>
        <div class="form-group">
            <label>প্লেয়ার আইডি সিলেক্ট করুন</label>
            <input type="text" id="targetPlayerId" placeholder="উদা: atoz123">
        </div>
        <div class="form-group">
            <label>অ্যাকশন সিলেক্ট করুন</label>
            <select id="pointAction">
                <option value="credit">পয়েন্ট যোগ করুন (Credit)</option>
                <option value="debit">পয়েন্ট কেটে নিন (Debit)</option>
            </select>
        </div>
        <div class="form-group">
            <label>পয়েন্টের পরিমাণ</label>
            <input type="number" id="playerPointsInput" placeholder="পয়েন্ট সংখ্যা লিখুন">
        </div>
        
        <div class="action-area">
            <label class="checkbox-container">
                <input type="checkbox" id="check_sec5"> আমি এই প্লেয়ারের পয়েন্ট পরিবর্তন করতে সম্মত
            </label>
            <button type="button" class="btn btn-red" id="btn_sec5" onclick="updatePlayerAccount()" disabled>UPDATE PLAYER POINTS</button>
        </div>
    </div>
</div>

<!-- =======================================================
     চেক-বক্স কন্ট্রোল ও সিকিউরিটি জাভাস্ক্রিপ্ট লজিক
     ======================================================= -->
<script>
    // বাটন লক/আনলক লজিক (চেক বক্সে টিক দিলে তবেই বাটন জ্বলবে)
    function setupCheckboxListener(checkboxId, buttonId) {
        document.getElementById(checkboxId).addEventListener('change', function() {
            document.getElementById(buttonId).disabled = !this.checked;
        });
    }

    // ৫টি সেকশনের জন্যই সিকিউরিটি লক অন করা হলো
    setupCheckboxListener('check_sec1', 'btn_sec1');
    setupCheckboxListener('check_sec2', 'btn_sec2');
    setupCheckboxListener('check_sec3', 'btn_sec3');
    setupCheckboxListener('check_sec4', 'btn_sec4');
    setupCheckboxListener('check_sec5', 'btn_sec5');

    // ওটিপি জেনারেটর ফাংশন
    function generateSecureOTP() {
        const otp = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('generatedOTP').value = otp;
        // এটি ফায়ারবেসে সেভ হবে যাতে প্লেয়ার বা সাব-এডমিন ম্যাচ করতে পারে
        alert("নতুন সিকিউর ওটিপি তৈরি হয়েছে: " + otp);
    }

    // উইনিং পয়েন্ট উইড্রো এবং লিমিট লজিক (ব্যাকএন্ড ইঞ্জিন)
    function approveWithdrawal() {
        const enteredOTP = document.getElementById('generatedOTP').value;
        const maxLimit = parseInt(document.getElementById('maxWithdrawLimit').value) || 1000;
        
        // এখানে ফায়ারবেস লজিক ট্রিগার হবে
        alert("এডমিন ওটিপি এপ্রুভড! " + maxLimit + " টাকা সীমার মধ্যে উইড্রো সফল হয়েছে।");
    }
    
    function updateSystemSettings() { alert("সেকশন ১ এর ডাটা সফলভাবে সংরক্ষিত হয়েছে!"); }
    function saveBaziRoutine() { alert("নতুন ডাইনামিক বাজি রুটিনে যোগ হয়েছে!"); }
    function publishBaziResult() { alert("ফলাফল সফলভাবে লাইভ প্লেয়ারদের কাছে পাঠানো হয়েছে!"); }
    function updatePlayerAccount() { alert("প্লেয়ার অ্যাকাউন্টের ব্যালেন্স মডিফাই করা হয়েছে!"); }
</script>

</body>
</html>
