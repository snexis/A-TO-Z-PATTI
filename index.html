<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-TO-Z Bombay | Admin Login</title>
    <link rel="stylesheet" href="./style.css">
    
    <!-- ১. ব্রাউজারের নিয়ম অনুযায়ী ইমপোর্ট ম্যাপ সবার উপরে থাকতে হবে (এরর ফিক্স) -->
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
      }
    </script>
</head>
<body>

    <!-- এখানে শুধু একটিই ক্লিন অ্যাডমিন পোর্টাল থাকবে (ডুপ্লিকেট ফিক্স) -->
    <div class="login-container">
        <h2>Admin Portal</h2>
        <form id="adminLoginForm">
            <div class="input-group">
                <label for="adminEmail">Admin ID</label>
                <input type="text" id="adminEmail" required placeholder="Enter admin unique ID">
            </div>
            
            <div class="input-group">
                <label for="adminPassword">Password</label>
                <input type="password" id="adminPassword" required placeholder="Enter password">
            </div>
            
            <button type="submit" class="btn">Secure Login</button>
        </form>
    </div>

  <!-- ২. মেইন ফায়ারবেস লজিক এবং লগইন হ্যান্ডলার (আপডেটেড ও ফিক্সড) -->
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "firebase/auth";
        import { getDatabase, ref, set } from "firebase/database";
        import { auth, db } from "./firebase-config.js"; // আপনার মেইন কনফিগ থেকেই রুট ডিক্লেয়ার করা হলো

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const inputId = document.getElementById('adminEmail').value.trim();
            const pass = document.getElementById('adminPassword').value;
            
            // ছোট আইডিকে ব্যাকগ্রাউন্ডে সিকিউর মেইলে কনভার্ট করা হচ্ছে
            const finalEmail = inputId.toLowerCase() + "@atoz.com";
            
            // ফায়ারবেস সিকিউরিটি বাইপাস: নতুন অ্যাকাউন্ট তৈরি ও ডেটাবেস রুট সেটআপ
            createUserWithEmailAndPassword(auth, finalEmail, pass)
                .then((userCredential) => {
                    const firebaseUID = userCredential.user.uid;
                    
                    // ডাটাবেসে role: "admin" রুট স্ট্রাকচার পুশ করে দেবে
                    set(ref(db, 'users/' + firebaseUID), {
                        role: "admin"
                    }).then(() => {
                        alert("🎉 সফলভাবে আপনার অ্যাডমিন আইডি তৈরি এবং ডাটাবেস রুট সেট হয়েছে!");
                        window.location.href = "admin-dashboard.html"; // সরাসরি ড্যাশবোর্ডে রিডাইরেক্ট
                    });
                })
                .catch((error) => {
                    // যদি অ্যাকাউন্টটি আগে থেকেই তৈরি করা থাকে, তবে সরাসরি লগইন করবে
                    if (error.code === 'auth/email-already-in-use') {
                        signInWithEmailAndPassword(auth, finalEmail, pass)
                            .then(() => {
                                window.location.href = "admin-dashboard.html";
                            })
                            .catch((err) => {
                                alert("ভুল পাসওয়ার্ড! আবার চেষ্টা করুন। " + err.message);
                            });
                    } else {
                        alert("লগইনে সমস্যা: " + error.message);
                    }
                });
        });
    </script>
</body>
</html>
