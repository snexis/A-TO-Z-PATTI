<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-TO-Z Bombay | Admin Login</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="login-container">
        <h2>Admin Portal</h2>
        <form id="adminLoginForm">
            <div class="input-group">
                <label for="adminEmail">Admin Email / ID</label>
                <input type="email" id="adminEmail" required placeholder="Enter admin email">
            </div>
            
            <div class="input-group">
                <label for="adminPassword">Password</label>
                <input type="password" id="adminPassword" required placeholder="Enter password">
            </div>
            
            <button type="submit" class="btn">Secure Login</button>
        </form>
    </div>

    <script type="module">
        import { handleAdminLogin } from "./auth.js";

        document.getElementById('adminLoginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPassword').value;
            handleAdminLogin(email, pass);
        });
    </script>
</body>
</html>
