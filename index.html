<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atoz Bombay - Secure Login Portal</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://www.gstatic.com/firebasejs/7.2.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.2.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.2.0/firebase-database.js"></script>

  <script src="firebase-config.js"></script>

  <script src="app.js"></script>
</head>
<body>

  <div class="login-container">
    <div class="brand-header">
      <h1>Atoz <span>Bombay</span></h1>
    </div>

    <div class="role-tabs">
      <button class="tab-btn active" onclick="setRole('player')">Player</button>
      <button class="tab-btn" onclick="setRole('subadmin')">Subadmin</button>
      <button class="tab-btn" onclick="setRole('admin')">Admin</button>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="userId">ইউজার আইডি (User ID)</label>
        <input type="text" id="userId" placeholder="আপনার আইডি লিখুন" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="userPin">পাসওয়ার্ড / পিন (PIN/Password)</label>
        <input type="password" id="userPin" placeholder="••••••" required autocomplete="current-password">
      </div>

      <button type="submit" class="login-btn">লগইন করুন</button>
    </form>

    <div id="errorAlert" class="error-msg"></div>
    <div id="loader" class="loading-spinner">সার্ভারের সাথে কানেক্ট হচ্ছে... অনুগ্রহ করে অপেক্ষা করুন।</div>
  </div>

  <script>
    // ইন্টারফেস ও রোল সুইচিং লজিক (যা index.html ফাইলেই থাকা দরকার)
    let selectedRole = 'player';

    function setRole(role) {
      selectedRole = role;
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
        if(btn.innerText.toLowerCase() === role) {
          btn.classList.add('active');
        }
      });
      hideElements();
    }

    function hideElements() {
      document.getElementById('errorAlert').style.display = 'none';
      document.getElementById('loader').style.display = 'none';
    }
  </script>
</body>
</html>
