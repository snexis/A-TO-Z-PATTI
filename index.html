<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atoz Bombay - Secure Login Portal</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://www.gstatic.com/firebasejs/7.2.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.2.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.2.0/firebase-database.js"></script>

  <script src="firebase-config.js"></script>

  <script src="app.js"></script>
</head>
<body>

  <div class="login-container">
    <div class="brand-header">
      <h1>Atoz <span>Bombay</span></h1>
      <p style="margin-top: 5px; color: #636b7a; font-size: 11px; letter-spacing: 2px;">SECURE LOGIN PORTAL</p>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      
      <div class="input-group">
        <label for="txtUserId">User ID</label>
        <input type="text" id="txtUserId" class="input-field" placeholder="Enter your ID" required autocomplete="username">
      </div>

      <div class="input-group">
        <label for="txtPin">PIN / Password</label>
        <div style="position: relative; display: flex; align-items: center;">
          <input type="password" id="txtPin" class="input-field" placeholder="••••••" required autocomplete="current-password" style="padding-right: 40px;">
          
          <span id="togglePin" onclick="togglePinVisibility()" style="position: absolute; right: 12px; cursor: pointer; color: #00f2fe; font-size: 18px; user-select: none;">
            👁️
          </span>
        </div>
      </div>

      <button type="submit" class="btn-primary" style="margin-top: 10px;">Login</button>
    </form>

    <div id="errorAlert" class="error-msg" style="display: none; color: #ff4b4b; font-size: 13px; margin-top: 15px;"></div>
    <div id="loader" class="loading-spinner" style="display: none; color: #00f2fe; font-size: 12px; margin-top: 15px; letter-spacing: 1px;">
      Connecting to server... Please wait.
    </div>
  </div>

  <script>
    // পিন বা পাসওয়ার্ড দেখার চোখ বাটন লজিক (অনলি ইনলাইন UI অ্যাকশন)
    function togglePinVisibility() {
      const pinField = document.getElementById('txtPin');
      const toggleIcon = document.getElementById('togglePin');
      
      if (pinField.type === 'password') {
        pinField.type = 'text';
        toggleIcon.innerText = '🔒'; // হাইড করার সিম্বল
      } else {
        pinField.type = 'password';
        toggleIcon.innerText = '👁️'; // শো করার সিম্বল
      }
    }

    // প্রাথমিক লোডার এবং এরর হাইড করে রাখার লজিক
    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('errorAlert').style.display = 'none';
      document.getElementById('loader').style.display = 'none';
    });
  </script>
</body>
</html>
