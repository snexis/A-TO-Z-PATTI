<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atoz Bombay - Player Panel</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/7.2.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.2.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.2.0/firebase-database.js"></script>
  
  <script src="firebase-config.js"></script>

  <style>
    /* ==========================================
       NEON GLASS-MORPHISM PLAYER THEME
       ========================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: #090a0f;
      color: #ffffff;
      min-height: 100vh;
      padding: 15px;
    }

    /* Header Bar with Isolated Balance Displays */
    header {
      background: rgba(20, 24, 35, 0.9);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(0, 242, 254, 0.15);
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .user-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .user-info h2 {
      font-size: 18px;
      letter-spacing: 1px;
    }

    .user-info h2 span {
      color: #00f2fe;
    }

    .balance-container {
      display: flex;
      gap: 15px;
    }

    .balance-box {
      flex: 1;
      background: rgba(0, 0, 0, 0.4);
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      text-align: center;
    }

    .balance-box p {
      font-size: 11px;
      color: #8f9cae;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .balance-box span {
      font-size: 18px;
      font-weight: 700;
      color: #00f2fe;
    }

    .balance-box.winning span {
      color: #39ff14; /* Neon Green for Winning */
    }

    /* Navigation & Utility Buttons */
    .utility-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .util-btn {
      flex: 1;
      padding: 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .util-btn:hover {
      background: rgba(0, 242, 254, 0.1);
      border-color: #00f2fe;
    }

    .util-btn.disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* 22x10 Play Matrix Grid CSS */
    .grid-container {
      background: rgba(20, 24, 35, 0.9);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      overflow-x: auto;
      margin-bottom: 20px;
    }

    .grid-header {
      text-align: center;
      margin-bottom: 15px;
      color: #00f2fe;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .bet-grid {
      display: grid;
      grid-template-columns: repeat(10, minmax(80px, 1fr)); /* 10 Columns (A to J) */
      gap: 8px;
    }

    .grid-cell {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .grid-cell.active {
      border-color: #00f2fe;
      background: rgba(0, 242, 254, 0.03);
    }

    .cell-label {
      font-size: 11px;
      font-weight: 700;
      color: #8f9cae;
    }

    .grid-cell.active .cell-label {
      color: #00f2fe;
    }

    .cell-controls {
      display: flex;
      align-items: center;
      gap: 4px;
      width: 100%;
    }

    .cell-checkbox {
      width: 16px;
      height: 16px;
      accent-color: #00f2fe;
      cursor: pointer;
    }

    .cell-input {
      width: 100%;
      padding: 4px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      color: white;
      font-size: 11px;
      text-align: center;
      outline: none;
    }

    .cell-input:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Submit Area */
    .submit-panel {
      position: sticky;
      bottom: 0;
      background: #090a0f;
      padding: 15px 0;
    }

    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
      color: #0d0e12;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
    }

    /* Popup Modal for Play History */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #141823;
      width: 90%;
      max-width: 450px;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #00f2fe;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 8px;
    }

    .close-btn {
      background: none;
      border: none;
      color: #ff4b4b;
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    <div class="user-info">
      <h2>ID: <span id="lblUserId">Loading...</span></h2>
      <button onclick="logout()" style="background:none; border:none; color:#ff4b4b; cursor:pointer; font-size:12px;">লগআউট</button>
    </div>
    <div class="balance-container">
      <div class="balance-box">
        <p>Play Point</p>
        <span id="lblPlayPoint">0</span>
      </div>
      <div class="balance-box winning">
        <p>Winning Point</p>
        <span id="lblWinningPoint">0</span>
      </div>
    </div>
  </header>

  <div class="utility-bar">
    <button class="util-btn" onclick="openHistory()">Play History</button>
    <button class="util-btn disabled" id="btnAdvanceDraw" onclick="toggleAdvanceDraw()">Advance Draw (Locked)</button>
  </div>

  <main class="grid-container">
    <div class="grid-header" id="gridTitle">Loading Game Grid...</div>
    
    <div class="bet-grid" id="mainBetGrid">
      </div>
  </main>

  <div class="submit-panel">
    <button class="submit-btn" onclick="submitAllBets()">Submit All Bets</button>
  </div>

  <div class="modal" id="historyModal">
    <div class="modal-content">
      <div class="modal-header">
        <h4>Your Play History</h4>
        <button class="close-btn" onclick="closeHistory()">&times;</button>
      </div>
      <div id="historyData" style="max-height: 300px; overflow-y: auto; font-size: 13px;">
        Loading history...
      </div>
    </div>
  </div>

  <script>
    let playerUID = "";
    let playerMode = "word"; // ডিফল্ট 'word' মোড
    let currentBalance = 0;
    let isAdvanceDrawAllowed = false;

    // ১. প্লেয়ার অথেন্টিকেশন অ্যান্ড সিকিউরিটি চেক
    window.auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = 'index.html';
      } else {
        playerUID = user.uid;
        loadPlayerProfile();
      }
    });

    // ২. প্রোফাইল ও ব্যালেন্স রিয়ালটাইম লোড
    function loadPlayerProfile() {
      window.db.ref('users/' + playerUID).on('value', snapshot => {
        const data = snapshot.val();
        if (data) {
          document.getElementById('lblUserId').innerText = data.userId;
          document.getElementById('lblPlayPoint').innerText = data.playPoints || 0;
          document.getElementById('lblWinningPoint').innerText = data.winningPoints || 0;
          currentBalance = data.playPoints || 0;
          playerMode = data.viewMode || 'word';

          // অ্যাডভান্স ড্র পারমিশন হ্যান্ডলিং
          isAdvanceDrawAllowed = data.advanceDraw || false;
          const advBtn = document.getElementById('btnAdvanceDraw');
          if (isAdvanceDrawAllowed) {
            advBtn.classList.remove('disabled');
            advBtn.innerText = "Advance Draw (Active)";
          } else {
            advBtn.classList.add('disabled');
            advBtn.innerText = "Advance Draw (Locked)";
          }

          // প্লেয়ারের ডেডিকেটেড গ্রিড জেনারেট করা
          generateGrid();
        }
      });
    }

    // ৩. ২২×১০ ডাইনামিক গ্রিড জেনারেটর লজিক (Word/Digit Mode Switch)
    function generateGrid() {
      const grid = document.getElementById('mainBetGrid');
      const title = document.getElementById('gridTitle');
      grid.innerHTML = "";

      title.innerText = playerMode === 'word' ? "Word Mode Active (A-J)" : "Digit Mode Active (1-0)";

      const columns = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J"];

      // ২২টি রো এবং ১০টি কলাম লুপ চালিয়ে ২২×১০ প্যানেল তৈরি করা
      for (let row = 0; row < 22; row++) {
        columns.forEach(col => {
          // ম্যাট্রিক্স থেকে প্লেয়ারের মোড অনুযায়ী কোড বা ডিজিট বের করা
          const matrixData = window.SECRET_MATRIX[col];
          const keys = Object.keys(matrixData.patti_map);
          const currentPattiCode = keys[row]; // ৩ অক্ষরের কোড
          const currentPattiDigit = matrixData.patti_map[currentPattiCode]; // ডিজিট মান

          // প্লেয়ার স্ক্রিনে কী দেখবে তা ডিফাইন করা
          const displayLabel = playerMode === 'word' ? currentPattiCode : currentPattiDigit;
          const inputId = `bet_${col}_${row}`;

          const cell = document.createElement('div');
          cell.className = 'grid-cell';
          cell.id = `cell_${col}_${row}`;
          cell.innerHTML = `
            <span class="cell-label">${displayLabel}</span>
            <div class="cell-controls">
              <input type="checkbox" class="cell-checkbox" onchange="toggleCellInput(this, '${inputId}')">
              <input type="number" id="${inputId}" class="cell-input" placeholder="0" disabled min="1">
            </div>
          `;
          grid.appendChild(cell);
        });
      }
    }

    // ৪. চেক-বক্স টিক দিলে ঘর আনলক করার লজিক (Tick & Type)
    function toggleCellInput(checkbox, inputId) {
      const input = document.getElementById(inputId);
      const cell = checkbox.closest('.grid-cell');
      
      input.disabled = !checkbox.checked;
      if (checkbox.checked) {
        cell.classList.add('active');
        input.focus();
      } else {
        cell.classList.remove('active');
        input.value = "";
      }
    }

    // ৫. ওয়ান-ক্লিক অল বেট সাবমিট মেকানিজম
    function submitAllBets() {
      const checkedBoxes = document.querySelectorAll('.cell-checkbox:checked');
      if (checkedBoxes.length === 0) {
        return alert("প্লে করতে প্রথমে যেকোনো ঘরে টিক (Tick) দিন এবং পয়েন্ট বসান!");
      }

      let totalCost = 0;
      let betsToSubmit = [];

      // ১. ভ্যালিডেশন এবং টোটাল ব্যালেন্স ক্যালকুলেশন
      for (let box of checkedBoxes) {
        const cell = box.closest('.grid-cell');
        const input = cell.querySelector('.cell-input');
        const amount = parseInt(input.value);

        if (!amount || amount <= 0) {
          alert("টিক দেওয়া ঘরে অবশ্যই বৈধ পয়েন্ট (অ্যামাউন্ট) বসাতে হবে!");
          input.focus();
          return;
        }

        totalCost += amount;
        
        // বেটিং অবজেক্ট রেডি করা
        betsToSubmit.push({
          cellId: input.id,
          label: cell.querySelector('.cell-label').innerText,
          points: amount
        });
      }

      // ২. ব্যালেন্স চেক
      if (totalCost > currentBalance) {
        return alert(`দুঃখিত! আপনার মেইন ব্যালেন্সের চেয়ে মোট বাজি বেশি হয়ে গেছে। বর্তমান ব্যালেন্স: ${currentBalance}`);
      }

      // ৩. ফায়ারবেস ডেটাবেসে ওয়ান-ক্লিক সাবমিশন
      const newBalance = currentBalance - totalCost;
      const baziId = "Bazi_Active_Slot"; // উদাহরণস্বরূপ অ্যাক্টিভ স্লট

      const updates = {};
      betsToSubmit.forEach(bet => {
        const newBetRef = window.db.ref(`active_bets/${baziId}`).push();
        updates[`active_bets/${baziId}/${newBetRef.key}`] = {
          userId: playerUID,
          label: bet.label,
          points: bet.points,
          timestamp: firebase.database.ServerValue.TIMESTAMP
        };
      });

      // ব্যালেন্স আপডেট ও সাবমিশন একসাথে করা (Transaction/Multi-path update)
      updates[`users/${playerUID}/playPoints`] = newBalance;

      window.db.ref().update(updates)
        .then(() => {
          alert(`অভিনন্দন! আপনার মোট ${totalCost} পয়েন্টের বাজি সফলভাবে সাবমিট হয়েছে।`);
          // সমস্ত ইনপুট ফিল্ড ও টিক রিসেট করা
          generateGrid();
        })
        .catch(err => alert("বাজি সাবমিট করতে ত্রুটি হয়েছে: " + err.message));
    }

    // ৬. অ্যাডভান্স ড্র হ্যান্ডলার
    function toggleAdvanceDraw() {
      if (!isAdvanceDrawAllowed) {
        alert("আপনার আইডিতে অ্যাডভান্স ড্র পারমিশন লক করা রয়েছে। অ্যাডমিনের সাথে যোগাযোগ করুন।");
        return;
      }
      alert("অ্যাডভান্স ড্র প্যানেল ওপেন হচ্ছে... আপনি আগামীকালের জন্য বেট আগে থেকেই সেট করতে পারেন।");
    }

    // ৭. প্লে হিস্ট্রি মডাল ওপেন ও ক্লোজ
    function openHistory() {
      document.getElementById('historyModal').style.display = 'flex';
      const historyDiv = document.getElementById('historyData');
      historyDiv.innerHTML = "লোড হচ্ছে...";

      // ইউজারের প্লে হিস্ট্রি রিড করা
      window.db.ref('active_bets/Bazi_Active_Slot').orderByChild('userId').equalTo(playerUID).once('value', snapshot => {
        historyDiv.innerHTML = "";
        if (snapshot.exists()) {
          snapshot.forEach(child => {
            const bet = child.val();
            const div = document.createElement('div');
            div.style.padding = "8px 0";
            div.style.borderBottom = "1px solid rgba(255,255,255,0.05)";
            div.innerHTML = `ঘণ্টা/বাজি: Active | ঘর: <strong>${bet.label}</strong> | পয়েন্ট: <span style="color:#00f2fe;">${bet.points}৳</span>`;
            historyDiv.appendChild(div);
          });
        } else {
          historyDiv.innerHTML = "আজকে আপনার কোনো খেলার রেকর্ড পাওয়া যায়নি।";
        }
      });
    }

    function closeHistory() {
      document.getElementById('historyModal').style.display = 'none';
    }

    function logout() {
      window.auth.signOut().then(() => {
        window.location.href = 'index.html';
      });
    }
  </script>
</body>
</html>
