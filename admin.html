<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-TO-Z Bombay | Admin Dashboard</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- ড্যাশবোর্ড হেডার -->
    <header class="dashboard-header">
        <h1 class="dashboard-title">ATOZ Bombay - Admin Panel</h1>
        <button id="logoutBtn" class="btn btn-danger" style="width: auto; padding: 10px 20px;">Secure Logout</button>
    </header>

    <!-- মেইন কন্টেন্ট এরিয়া -->
    <main class="main-content">
        <h2 style="text-align: center; color: #fff; margin-bottom: 10px;">220 Patti Live Matrix Controller</h2>
        <p style="text-align: center; color: #94a3b8; margin-bottom: 30px;">Click on any patti to update its live value instantly.</p>

        <!-- ২২০ পাত্তি লোড হওয়ার গ্রিড কন্টেইনার -->
        <div id="pattiMatrix" class="matrix-grid">
            <!-- জাভাস্ক্রিপ্ট দিয়ে এখানে স্বয়ংক্রিয়ভাবে ২২০টি পাত্তি জেনারেট হবে -->
        </div>
    </main>

    <!-- ফায়ারবেস এবং কন্ট্রোল লজিক স্ক্রিপ্ট -->
    <script type="module">
        import { protectAdminPage, handleAdminLogout } from "./auth.js";
        import { db } from "./firebase-config.js";
        import { ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ১. পেজ সিকিউরিটি লক সচল করা (অননুমোদিত ইউজার আটকাতে)
        protectAdminPage();

        // লগআউট বাটন অ্যাকশন
        document.getElementById('logoutBtn').addEventListener('click', handleAdminLogout);

        // ২. ২২০টি পাত্তির লিস্ট ডেটাবেস জেনারেশন ও লাইভ লিসেনিং লজিক
        const pattiMatrixContainer = document.getElementById('pattiMatrix');
        const gameDataRef = ref(db, 'pattiData');

        // লাইভ ফায়ারবেস ডাটা লোড ও রেন্ডারিং (ল্যাগ-ফ্রি মেথড)
        onValue(gameDataRef, (snapshot) => {
            pattiMatrixContainer.innerHTML = ''; // আগের ডেটা ক্লিয়ার করা
            const data = snapshot.val() || {};

            // ২২০টি পাত্তির লুপ প্রসেসিং (000 থেকে 999 এর মধ্যকার সমস্ত স্ট্যান্ডার্ড কম্বিনেশন)
            // যদি ডাটাবেসে পাত্তি না থাকে তবে ইনিশিয়াল ডাটা রেডি করবে
            for (let i = 100; i <= 999; i++) {
                // পাত্তির সাধারণ নিয়ম: সংখ্যাগুলো ছোট থেকে বড় সাজানো থাকে (যেমন: 123, 112)
                const digits = i.toString().split('').map(Number);
                if (digits[0] <= digits[1] && digits[1] <= digits[2]) {
                    const pattiNum = i.toString();
                    const pattiValue = data[pattiNum] !== undefined ? data[pattiNum] : "-";

                    // সিঙ্গেল পাত্তি কার্ড কার্ড তৈরি
                    const card = document.createElement('div');
                    card.className = 'patti-card';
                    card.innerHTML = `
                        <span class="patti-number">${pattiNum}</span>
                        <span class="patti-value" id="val-${pattiNum}">${pattiValue}</span>
                    `;

                    // কার্ডে ক্লিক করলে লাইভ আপডেট করার ইভেন্ট
                    card.addEventListener('click', () => {
                        const newValue = prompt(`Enter new live value for Patti ${pattiNum}:`, pattiValue === "-" ? "" : pattiValue);
                        if (newValue !== null && newValue.trim() !== "") {
                            // ডাটাবেসে রিয়েল-টাইম আপডেট পাঠানো
                            const updateObj = {};
                            updateObj[pattiNum] = newValue.trim();
                            update(gameDataRef, updateObj)
                            .then(() => console.log(`Patti ${pattiNum} updated to ${newValue}`))
                            .catch((err) => alert("Error updating data: " + err.message));
                        }
                    });

                    pattiMatrixContainer.appendChild(card);
                }
            }
        });
    </script>
</body>
</html>
