<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtoZ Bombay - Admin Control Panel (v4.9)</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="firebase-config.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-page">

    <header class="admin-nav">
        <div class="nav-logo">ATOZ BOMBAY - ADMIN (v4.9)</div>
        <div class="nav-user-info">
            <span id="adminNameDisplay">অ্যাডমিন</span>
            <button type="button" id="logoutBtn" class="logout-btn">লগআউট</button>
        </div>
    </header>

    <main class="admin-container">
        
        <section class="dashboard-counters">
            <div class="card bg-cyan">
                <h3>টোটাল প্লেয়ার</h3>
                <p id="totalPlayersCount">0</p>
            </div>
            <div class="card bg-purple">
                <h3>অ্যাক্টিভ প্লেয়ার</h3>
                <p id="activePlayersCount">0</p>
            </div>
            <div class="card bg-dark-red">
                <h3>ব্লকড প্লেয়ার</h3>
                <p id="blockedPlayersCount">0</p>
            </div>
        </section>

        <section class="admin-grid">
            
            <div class="admin-box">
                <h3>🆕 নতুন প্লেয়ার/সাব-অ্যাডমিন তৈরি করুন</h3>
                <form id="createUserForm" onsubmit="event.preventDefault();">
                    <div class="form-group">
                        <label>ইউজার আইডি</label>
                        <input type="text" id="newUsername" placeholder="ইউনিক আইডি লিখুন" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>সিকিউরিটি পিন (পাসওয়ার্ড)</label>
                        <input type="password" id="newPassword" placeholder="পিন সেট করুন" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>রোল (Role) সিলেক্ট করুন</label>
                        <select id="userRole">
                            <option value="player">प्लेयर (Player)</option>
                            <option value="subadmin">সাব-অ্যাডমিন (Sub-Admin)</option>
                        </select>
                    </div>
                    <button type="button" id="submitCreateUserBtn" class="action-btn-glow">আইডি তৈরি করুন</button>
                </form>
            </div>

            <div class="admin-box">
                <h3>📊 লাইভ গেম চার্ট ও রেজাল্ট এন্ট্রি</h3>
                <form id="gameDataForm" onsubmit="event.preventDefault();">
                    <div class="form-group">
                        <label>গেমের সময়/রাউন্ড (Time Slot)</label>
                        <input type="text" id="gameTimeSlot" placeholder="যেমন: 12:00 PM" required>
                    </div>
                    <div class="form-group">
                        <label>উইনিং নাম্বার/রেজাল্ট</label>
                        <input type="number" id="winningNumber" placeholder="নাম্বার বসান" required>
                    </div>
                    <button type="button" id="updateChartBtn" class="action-btn-glow">চার্ট আপডেট করুন</button>
                </form>
            </div>

        </section>

        <section class="admin-box list-section">
            <h3>👥 প্লেয়ার লিস্ট ও এপ্রুভাল কন্ট্রোল (Auto-Refresh Free)</h3>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>ইউজার আইডি</th>
                            <th>রোল</th>
                            <th>সিকিউরিটি কোড</th>
                            <th>অনুমোদন স্ট্যাটাস</th>
                            <th>অ্যাকশন (Action)</th>
                        </tr>
                    </thead>
                    <tbody id="playerTableBody">
                        </tbody>
                </table>
            </div>
        </section>

    </main>

    <script src="admin.js"></script>
</body>
</html>
